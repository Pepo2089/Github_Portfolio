<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <title>Colors - Learn Spanish</title>
    <link rel="stylesheet" href="coulorVocabulary_style.css">
</head>
<body>
    <div class="container">
        <h1>Colors</h1>
        <h2>Learn the colors in Spanish!</h2>
        
        <div class="color-item">
            <div class="color-label" id="rojo-label">Rojo</div>
            <div class="color-box" style="background-color: red;"></div>
        </div>
        
        <div class="color-item">
            <div class="color-label" id="azul-label">Azul</div>
            <div class="color-box" style="background-color: #4DA6FF;"></div>
        </div>
        
        <div class="color-item">
            <div class="color-label" id="anaranjado-label">Anaranjado</div>
            <div class="color-box" style="background-color: orange;"></div>
        </div>
    </div>
</body>
</html>
